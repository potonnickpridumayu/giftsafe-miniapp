<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>GiftSafe</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <!-- Сплэш рисуется до загрузки React — скрывает белый экран и прыжок шрифтов.
         Прячет его App.jsx после монтирования (мин. 600мс показа). -->
    <style>
      #splash{position:fixed;inset:0;z-index:9999;background:#0a0a0f;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;transition:opacity .35s ease}
      #splash.hide{opacity:0;pointer-events:none}
      #splash .gem{width:36px;height:36px;border-radius:10px;background:#ff5c7c;animation:splash-pulse 1.1s ease-in-out infinite}
      #splash .word{font-family:'Space Grotesk',system-ui,sans-serif;font-weight:700;font-size:34px;color:#ff2d55;letter-spacing:.5px}
      @keyframes splash-pulse{0%,100%{transform:rotate(45deg) scale(1);opacity:1}50%{transform:rotate(45deg) scale(.8);opacity:.65}}
    </style>
    <div id="splash">
      <div class="gem"></div>
      <div class="word">ruby</div>
    </div>
    <script>window.__splashAt = Date.now()</script>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
