<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>GiftSafe</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <!-- Сплэш рисуется до загрузки React — скрывает белый экран и прыжок шрифтов.
         Анимация повторяет видео-исходник (ромбик падает → появляется r → слово),
         но собрана в CSS: вектор + шрифт = идеальная чёткость и частота кадров
         экрана, и она зациклена — крутится, пока App.jsx не скроет сплэш
         (данные готовы + минимум один полный цикл 3с). -->
    <style>
      #splash{position:fixed;inset:0;z-index:9999;background:#18070e;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .35s ease}
      #splash.hide{opacity:0;pointer-events:none}
      #splash .mark{position:relative;width:150px;height:168px}
      #splash .r{position:absolute;left:6px;bottom:-34px;font-family:'Space Grotesk',system-ui,sans-serif;font-weight:700;font-size:150px;line-height:1;color:#ff2d55;animation:spl-r 3s ease infinite}
      #splash .gem{position:absolute;right:6px;top:0;width:54px;height:54px;border-radius:16px;background:#ff5c7c;animation:spl-gem 3s cubic-bezier(.34,1.56,.64,1) infinite}
      #splash .word{margin-top:40px;font-family:'Space Grotesk',system-ui,sans-serif;font-weight:700;font-size:34px;letter-spacing:1px;color:#fff;animation:spl-word 3s ease infinite}
      @keyframes spl-gem{0%{transform:translateY(-90px) rotate(45deg);opacity:0}10%{opacity:1}28%{transform:translateY(0) rotate(45deg)}100%{transform:translateY(0) rotate(45deg);opacity:1}}
      @keyframes spl-r{0%,20%{transform:translateY(22px);opacity:0}42%{transform:translateY(0);opacity:1}100%{transform:translateY(0);opacity:1}}
      @keyframes spl-word{0%,52%{transform:translateY(10px);opacity:0}72%{transform:translateY(0);opacity:1}100%{transform:translateY(0);opacity:1}}
    </style>
    <div id="splash">
      <div class="mark">
        <span class="r">r</span>
        <div class="gem"></div>
      </div>
      <div class="word">ruby</div>
    </div>
    <script>
      window.__splashAt = Date.now()
      window.__splashMin = 3000 // минимум один полный цикл анимации
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
