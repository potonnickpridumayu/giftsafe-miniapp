<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>GiftSafe</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <!-- Сплэш рисуется до загрузки React — скрывает белый экран и прыжок шрифтов.
         Анимация — видео (3с, как в исходнике); до его старта просто тёмный фон
         в цвет видео. Прячет сплэш App.jsx: данные готовы + минимум (__splashMin). -->
    <style>
      #splash{position:fixed;inset:0;z-index:9999;background:#18070e;transition:opacity .35s ease}
      #splash.hide{opacity:0;pointer-events:none}
      #splash video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
    </style>
    <div id="splash">
      <video id="splash-video" src="/splash.mp4" muted playsinline autoplay preload="auto"></video>
    </div>
    <script>
      window.__splashAt = Date.now()
      window.__splashMin = 600
      document.getElementById('splash-video').addEventListener('playing', function () {
        window.__splashMin = 3000 // видео отыгрывает целиком
      })
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
